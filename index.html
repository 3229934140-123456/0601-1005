<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化工作台 - 经营分析看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <div id="app" class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i class="ri-dashboard-3-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-gray-900">数据工作台</h1>
                        <p class="text-xs text-gray-500">经营分析看板</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <button data-page="data-select" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all active">
                    <i class="ri-database-2-line text-lg"></i>
                    <span>数据选择</span>
                </button>
                <button data-page="chart-edit" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-bar-chart-box-line text-lg"></i>
                    <span>图表编辑</span>
                </button>
                <button data-page="layout" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-layout-masonry-line text-lg"></i>
                    <span>布局画布</span>
                </button>
                <button data-page="filters" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-filter-3-line text-lg"></i>
                    <span>筛选器设置</span>
                </button>
                <button data-page="metrics" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-file-list-3-line text-lg"></i>
                    <span>指标说明</span>
                </button>
                <button data-page="share" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-share-forward-line text-lg"></i>
                    <span>分享管理</span>
                </button>
                <button data-page="display" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-all">
                    <i class="ri-tv-2-line text-lg"></i>
                    <span>播放大屏</span>
                </button>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center gap-3 px-4 py-3 bg-gray-50 rounded-lg">
                    <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
                        <i class="ri-user-line text-gray-600"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-900">分析师</p>
                        <p class="text-xs text-gray-500">经营分析组</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <h2 id="page-title" class="text-lg font-semibold text-gray-900">数据选择</h2>
                    <span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-xs rounded-full">草稿</span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleThemePanel()" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                        <i class="ri-palette-line text-lg"></i>
                    </button>
                    <button onclick="toggleMobilePreview()" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                        <i class="ri-smartphone-line text-lg"></i>
                    </button>
                    <button onclick="exportImage()" class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                        <i class="ri-download-2-line text-lg"></i>
                    </button>
                    <div class="w-px h-6 bg-gray-200"></div>
                    <button class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition-colors">预览</button>
                    <button class="px-4 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors">保存看板</button>
                </div>
            </header>

            <div id="page-container" class="flex-1 overflow-auto">
                <div id="page-data-select" class="page-content p-6"></div>
                <div id="page-chart-edit" class="page-content p-6 hidden"></div>
                <div id="page-layout" class="page-content hidden"></div>
                <div id="page-filters" class="page-content p-6 hidden"></div>
                <div id="page-metrics" class="page-content p-6 hidden"></div>
                <div id="page-share" class="page-content p-6 hidden"></div>
                <div id="page-display" class="page-content hidden"></div>
            </div>
        </main>
    </div>

    <div id="theme-panel" class="fixed right-0 top-0 h-full w-72 bg-white border-l border-gray-200 shadow-xl transform translate-x-full transition-transform z-50">
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
            <h3 class="font-semibold text-gray-900">主题配色</h3>
            <button onclick="toggleThemePanel()" class="p-1 hover:bg-gray-100 rounded">
                <i class="ri-close-line text-gray-500"></i>
            </button>
        </div>
        <div class="p-4 space-y-4">
            <p class="text-sm text-gray-500">选择预设主题或自定义配色</p>
            <div class="grid grid-cols-2 gap-3" id="theme-list"></div>
            <div class="pt-4 border-t border-gray-100">
                <label class="text-sm font-medium text-gray-700 block mb-3">自定义主色</label>
                <div class="flex items-center gap-2">
                    <input type="color" id="custom-primary-color" value="#3b82f6" class="w-10 h-10 rounded cursor-pointer">
                    <span id="custom-color-hex" class="text-sm text-gray-600">#3b82f6</span>
                </div>
            </div>
            <button onclick="applyCustomTheme()" class="w-full py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm">应用自定义主题</button>
        </div>
    </div>

    <div id="mobile-preview" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-gray-900 rounded-[3rem] p-3 shadow-2xl">
            <div class="bg-white w-[375px] h-[667px] rounded-[2.5rem] overflow-hidden relative">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-gray-900 rounded-b-2xl z-10"></div>
                <div id="mobile-content" class="h-full overflow-auto pt-8"></div>
            </div>
        </div>
        <button onclick="toggleMobilePreview()" class="absolute top-6 right-6 text-white hover:text-gray-300">
            <i class="ri-close-line text-3xl"></i>
        </button>
    </div>

    <div id="anomaly-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-[480px] max-h-[80vh] overflow-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-lg text-gray-900">异常点标注</h3>
                <button onclick="closeAnomalyModal()" class="p-1 hover:bg-gray-100 rounded">
                    <i class="ri-close-line text-gray-500"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-2">异常类型</label>
                    <select id="anomaly-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="spike">数据突增</option>
                        <option value="drop">数据突降</option>
                        <option value="outlier">异常值</option>
                        <option value="trend">趋势变化</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-2">标注说明</label>
                    <textarea id="anomaly-desc" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入异常说明..."></textarea>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-2">标注颜色</label>
                    <div class="flex gap-2">
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-red-500 ring-2 ring-offset-2 ring-red-500" data-color="#ef4444"></button>
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-orange-500" data-color="#f97316"></button>
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-yellow-500" data-color="#eab308"></button>
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-green-500" data-color="#22c55e"></button>
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-blue-500" data-color="#3b82f6"></button>
                        <button class="anomaly-color-btn w-8 h-8 rounded-full bg-purple-500" data-color="#a855f7"></button>
                    </div>
                </div>
                <button onclick="saveAnomaly()" class="w-full py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">保存标注</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
